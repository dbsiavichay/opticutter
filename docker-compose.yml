services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: api
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OPT_RESULT_TTL_SECONDS=259200
      - ATTACHMENTS_DIR=/src/uploads
    volumes:
      - ./:/src/
      # Named volume so uploaded annexes survive rebuilds and don't leak into
      # the bind-mounted repo tree.
      - uploads_data:/src/uploads
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
    networks:
      - cutter_network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: cutter_db
      POSTGRES_USER: cutter
      POSTGRES_PASSWORD: cutter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - cutter_network

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - cutter_network

networks:
  cutter_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
