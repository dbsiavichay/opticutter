[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    ".pytest_cache",
    "htmlcov",
    "build",
    "dist",
    "*.egg-info",
    "alembic/versions",
]

[tool.ruff.lint]
# E/W (pycodestyle), F (pyflakes = flake8 + autoflake), I (isort)
select = ["E", "W", "F", "I"]
ignore = ["E203", "E501"]  # E501 lo gestiona el formateador; E203 choca con format

[tool.ruff.lint.isort]
known-first-party = ["src", "config"]

[tool.ruff.format]
# estilo equivalente a black (default)

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "unit: prueba unitaria sin DB (mock/funciones puras); no requiere PostgreSQL",
    "integration: prueba de integración contra PostgreSQL real",
]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--disable-warnings",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=80"
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/venv/*",
    "*/__pycache__/*",
    "*/migrations/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError"
]