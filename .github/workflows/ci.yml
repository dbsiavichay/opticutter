name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_dev.txt
      - run: pip install -r requirements_dev.txt
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cutter
          POSTGRES_PASSWORD: cutter
          # tests/conftest.py truncates every table between tests, so it must
          # never point at a database that could hold real data. The suite is
          # wired to this name specifically.
          POSTGRES_DB: cutter_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cutter -d cutter_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cutter:cutter@localhost:5432/cutter_test_db
      TEST_DATABASE_URL: postgresql://cutter:cutter@localhost:5432/cutter_test_db
      # bcrypt's cost is deliberate; 4 rounds still produces valid hashes and
      # keeps the fixtures from dominating the run.
      BCRYPT_ROUNDS: "4"
      # Keeps SECRET_KEY optional (it is mandatory only when production).
      ENVIRONMENT: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_dev.txt

      # Some tests render the cutting diagram through Pillow, which needs a
      # TrueType font. The runner image does not ship one by default.
      - name: Install DejaVu fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - run: pip install -r requirements_dev.txt

      # No Redis service: tests/conftest.py substitutes an in-memory double.
      # pyproject.toml enforces --cov-fail-under=80, so the whole suite runs,
      # not just `-m unit`.
      - run: pytest -q
